<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HMS Professional - Frontend</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>Hotel Management System</h1>
      <nav id="main-nav">
        <button id="view-dashboard">Dashboard</button>
        <button id="view-rooms">Rooms</button>
        <button id="view-bookings">Bookings</button>
      </nav>
    </header>

    <main id="app">
      <section id="room-grid" class="grid-container"></section>
    </main>

    <div id="booking-modal" class="modal-overlay" hidden>
      <div class="modal-content">
        <form id="booking-form">
          <h2>Confirm Booking</h2>
          <label for="guest-name">Guest Name</label>
          <input type="text" id="guest-name" name="guestName" required />

          <label for="nights">Number of Nights</label>
          <input
            type="number"
            id="nights"
            name="nights"
            min="1"
            value="1"
            required
          />

          <div class="modal-actions">
            <button type="submit">Confirm Booking</button>
            <button type="button" id="cancel-booking">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
